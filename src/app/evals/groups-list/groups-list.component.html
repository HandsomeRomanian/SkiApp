<app-header title="{{ title }}"></app-header>

<ion-content padding>

  <ion-item>
    <ion-label *ngIf="listVisibility">Cours courrants seulement</ion-label>
    <ion-toggle slot="end" (click)="updateList()" [(ngModel)]="onlyCurrent"></ion-toggle>
  </ion-item>

  <ion-list *ngIf="listVisibility">
    <ion-item text-center routerLinkActive="active" *ngFor="let grp of getGroups()"
      routerLink="/evals/group/{{ grp.groupId }}" class="list-item">
      <ion-label>
        <h2>
          <ion-badge color="primary" slot="end">{{ grp.number }}</ion-badge>
          {{ grp.time.substr(0, 5) + " " + this.day[grp.day - 1] }}
        </h2>
        <h2>{{ grp.teacher.firstName + " " + grp.teacher.lastName}}</h2>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
